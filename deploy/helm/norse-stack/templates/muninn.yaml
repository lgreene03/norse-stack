{{- if .Values.muninn.enabled -}}
{{- $svc := .Values.muninn -}}
{{- $name := printf "%s-muninn" (include "norse-stack.fullname" .) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "norse-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: muninn
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      {{- include "norse-stack.selectorLabels" (dict "ctx" . "component" "muninn") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "norse-stack.selectorLabels" (dict "ctx" . "component" "muninn") | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $svc.metricsPort | quote }}
        prometheus.io/path: {{ $svc.metricsPath | quote }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: muninn
          image: {{ include "norse-stack.image" (dict "ctx" . "svc" $svc) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ $svc.service.httpPort }}
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.externals.kafka.brokers | quote }}
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.externals.postgresMuninn.url | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              {{- if $svc.dbSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $svc.dbSecret.name }}
                  key: {{ $svc.dbSecret.userKey }}
              {{- else }}
              value: {{ $svc.dbUserDefault | quote }}
              {{- end }}
            - name: SPRING_DATASOURCE_PASSWORD
              {{- if $svc.dbSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $svc.dbSecret.name }}
                  key: {{ $svc.dbSecret.passwordKey }}
              {{- else }}
              value: {{ $svc.dbPasswordDefault | quote }}
              {{- end }}
            - name: MUNINN_STORAGE_S3_ENDPOINT
              value: {{ .Values.externals.minio.endpoint | quote }}
            - name: MUNINN_STORAGE_S3_ACCESS_KEY
              {{- if $svc.minioSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $svc.minioSecret.name }}
                  key: {{ $svc.minioSecret.accessKeyKey }}
              {{- else }}
              value: {{ $svc.minioAccessKeyDefault | quote }}
              {{- end }}
            - name: MUNINN_STORAGE_S3_SECRET_KEY
              {{- if $svc.minioSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $svc.minioSecret.name }}
                  key: {{ $svc.minioSecret.secretKeyKey }}
              {{- else }}
              value: {{ $svc.minioSecretKeyDefault | quote }}
              {{- end }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.externals.tempo.endpoint | quote }}
            {{- range $k, $v := $svc.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "norse-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: muninn
spec:
  type: {{ $svc.service.type }}
  selector:
    {{- include "norse-stack.selectorLabels" (dict "ctx" . "component" "muninn") | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.service.httpPort }}
      targetPort: http
{{- end }}
