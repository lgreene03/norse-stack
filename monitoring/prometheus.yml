global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules evaluated by Prometheus; alerts route to Alertmanager below.
rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'huginn'
    static_configs:
      - targets: ['huginn:8081']
    metrics_path: /metrics

  - job_name: 'sleipnir'
    static_configs:
      - targets: ['sleipnir:8080']
    metrics_path: /metrics

  - job_name: 'odin'
    static_configs:
      - targets: ['odin:8086']
    metrics_path: /metrics

  - job_name: 'huginn-ai'
    static_configs:
      - targets: ['huginn-ai:8091']
    metrics_path: /metrics

  - job_name: 'muninn'
    static_configs:
      - targets: ['muninn:8080']
    metrics_path: /actuator/prometheus
