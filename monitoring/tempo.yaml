# Minimal Tempo config for the Norse Stack local OTel stack.
# Mirrors sleipnir/telemetry/tempo.yaml. See
# https://grafana.com/docs/tempo/latest/configuration/
#
# metrics_generator emits service-graph + span metrics to Prometheus so
# Grafana's service-graph / trace-to-metrics features have data to render.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks

compactor:
  compaction:
    block_retention: 24h  # local dev — short retention

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
