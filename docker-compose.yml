# Norse Stack — distributed quantitative trading infrastructure.
#
# Live mode: real Binance market data → features → strategy → sim execution.
# No API keys required — uses unauthenticated public market data streams.
#
# Usage:
#   docker compose up -d --build
#   ./scripts/smoke.sh
#   docker compose down -v
#
# Requires sibling checkouts: ../muninn, ../huginn, ../sleipnir
# Run ./scripts/clone-all.sh to set up all repos.

services:

  # ── Shared infrastructure ─────────────────────────────────────────────

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:19092
    ports:
      - "127.0.0.1:19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.1.0
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    restart: unless-stopped

  postgres-muninn:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: muninn
      POSTGRES_USER: muninn
      POSTGRES_PASSWORD: ${MUNINN_DB_PASSWORD:-muninn}
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muninn"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata-muninn:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-huginn:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${HUGINN_DB_PASSWORD:-postgres}
      POSTGRES_DB: huginn
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata-huginn:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/muninn-raw;
      mc mb --ignore-existing local/muninn-warehouse;
      mc mb --ignore-existing local/muninn-checkpoints;
      "

  # ── Topic provisioning ────────────────────────────────────────────────
  # Creates Kafka topics with explicit partitions + retention/cleanup policy
  # instead of relying on broker auto-create defaults (unbounded). Mirrors the
  # minio-init bucket step. Idempotent — safe to re-run. Per-topic rationale
  # lives in docs/CONTRACTS.md.
  topic-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/provision-topics.sh"]
    environment:
      BROKERS: redpanda:29092
      RPK: rpk
    volumes:
      - ./scripts/provision-topics.sh:/provision-topics.sh:ro
    restart: "no"

  # ── Application services ──────────────────────────────────────────────

  muninn:
    build:
      context: ../muninn
      dockerfile: Dockerfile
    depends_on:
      postgres-muninn:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-muninn:5432/muninn
      SPRING_DATASOURCE_USERNAME: muninn
      SPRING_DATASOURCE_PASSWORD: ${MUNINN_DB_PASSWORD:-muninn}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      MUNINN_STORAGE_S3_ENDPOINT: http://minio:9000
      MUNINN_STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MUNINN_STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MUNINN_INGESTION_BINANCE_ENABLED: "true"
      MUNINN_INGESTION_COINBASE_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    healthcheck:
      # Temurin JRE base ships bash but no curl/wget; probe the actuator port
      # over bash's /dev/tcp so the check needs no extra packages.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /actuator/health HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q UP <&3'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    mem_limit: 1g
    cpus: 2.0
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  huginn:
    build:
      context: ../huginn
      dockerfile: Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      postgres-huginn:
        condition: service_healthy
    ports:
      - "8083:8081"
      - "8084:8084"
      - "50051:50051"
    environment:
      KAFKA_BROKERS: redpanda:29092
      KAFKA_TOPICS: features.obi.v1
      KAFKA_GROUP_ID: huginn-paper-trader
      STRATEGY_NAME: obi
      # 0.7 (not 0.95): the cost gate needs signal-strength gradient above the
      # threshold to estimate edge. At 0.95 every signal barely clears the line,
      # so |obi-threshold| is tiny, expected edge < round-trip cost, and the gate
      # suppresses 100% of trades. 0.7 is the config the gate was validated on
      # (-59 -> +1 net). The gate (COST_HURDLE_K below) provides the selectivity.
      STRATEGY_THRESHOLD: "0.7"
      STRATEGY_ORDER_SIZE: "0.001"
      # Cost-aware trading: only take an entry whose expected edge exceeds
      # COST_HURDLE_K x round-trip cost. On the 24h fixture k=1 flipped realized
      # PnL from -59 (235 fills) to +1 (32 fills) by cutting fee-bleeding
      # marginal trades. 0 disables the gate.
      COST_HURDLE_K: "1.0"
      OBI_EDGE_BPS_PER_UNIT: "60"
      LIVE_EXECUTION: "true"
      KAFKA_INTENTS_TOPIC: executions.intents.v1
      KAFKA_FILLS_TOPIC: executions.fills.v1
      DATABASE_ENABLED: "true"
      DATABASE_URL: postgres://postgres:${HUGINN_DB_PASSWORD:-postgres}@postgres-huginn:5432/huginn?sslmode=disable
      CAPITAL_INITIAL_CASH: "1000"
      KAFKA_PRICE_TOPIC: "prices.realtime.v1"
      SERVER_PORT: "8081"
      GRPC_PORT: "50051"
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
      # Control-plane bearer token gating mutating endpoints. Empty disables
      # auth; the local-dev default keeps the fail-closed middleware active.
      HUGINN_API_TOKEN: ${HUGINN_API_TOKEN:-localdev-change-me}
    healthcheck:
      # Container health = liveness (process up). Use /healthz, NOT /readyz:
      # /readyz reflects consumer-loop progress (for alerting/k8s), and gating
      # the container on it would flap if the feature stream briefly pauses.
      # /healthz is on SERVER_PORT (8081); Alpine base ships busybox wget.
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: 512m
    cpus: 1.5
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  sleipnir:
    build:
      context: ../sleipnir
      dockerfile: Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
      KAFKA_INTENTS_TOPIC: executions.intents.v1
      KAFKA_FILLS_TOPIC: executions.fills.v1
      KAFKA_CONSUMER_GROUP: sleipnir-gateway
      EXCHANGE_BACKEND: sim
      SIM_TX_COST_BPS: "10"
      RATE_LIMIT_RPS: "10.0"
      PORT: "8080"
      DB_PATH: /app/data/sleipnir.db
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
      # Control-plane admin token gating mutating endpoints. Empty disables
      # auth; the local-dev default keeps the fail-closed middleware active.
      SLEIPNIR_ADMIN_TOKEN: ${SLEIPNIR_ADMIN_TOKEN:-localdev-change-me}
    healthcheck:
      # Container health = liveness (process up). Use /healthz, NOT /readyz:
      # sleipnir's /readyz returns 200 only after the first intent is consumed,
      # so an idle-but-healthy gateway would be marked unhealthy until it trades.
      # /healthz is on PORT (8080); Alpine base ships busybox wget.
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: 512m
    cpus: 1.5
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - sleipnir-data:/app/data
    restart: unless-stopped

  # ── Live data bridge ──────────────────────────────────────────────────

  obi-bridge:
    build:
      context: ./services/obi-bridge
      dockerfile: Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:29092
      OBI_TOPIC: features.obi.v1
      SYMBOLS: "BTCUSDT,ETHUSDT,SOLUSDT,XRPUSDT,DOGEUSDT"
      POLL_INTERVAL: "60"
      BOOK_LEVELS: "20"
      OBI_THRESHOLD: "0.95"
    healthcheck:
      # obi-bridge has no HTTP server; confirm the long-running bridge.py
      # process is still alive by scanning /proc cmdlines (python:slim has no
      # pgrep/curl). Liveness only — fails closed if the worker has exited.
      test: ["CMD-SHELL", "python3 -c \"import glob,sys; sys.exit(0 if any('bridge.py' in open(p,'rb').read().decode('utf-8','replace') for p in glob.glob('/proc/[0-9]*/cmdline')) else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 256m
    restart: unless-stopped

  # ── Analytics & Explainability ───────────────────────────────────────

  odin:
    build:
      context: ./services/odin
      dockerfile: Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      KAFKA_BROKERS: redpanda:29092
      FILLS_TOPIC: executions.fills.v1
      PORT: "8086"
      INITIAL_CASH: "1000"
      # CORS: defaults to "*" (permissive). Lock to a single origin in prod.
      ACCESS_CONTROL_ALLOW_ORIGIN: ${ACCESS_CONTROL_ALLOW_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8086/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    restart: unless-stopped

  bragi:
    build:
      context: ./services/bragi
      dockerfile: Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8087:8087"
    environment:
      KAFKA_BROKERS: redpanda:29092
      FEATURES_TOPIC: features.obi.v1
      FILLS_TOPIC: executions.fills.v1
      OBI_THRESHOLD: "0.95"
      PORT: "8087"
      # CORS: defaults to "*" (permissive). Lock to a single origin in prod.
      ACCESS_CONTROL_ALLOW_ORIGIN: ${ACCESS_CONTROL_ALLOW_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8087/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    restart: unless-stopped

  # ── ML & Intelligence ─────────────────────────────────────────────────

  huginn-ai:
    build:
      context: ./services/huginn-ai
      dockerfile: Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8092:8091"
    environment:
      KAFKA_BROKERS: redpanda:29092
      FEATURES_TOPIC: features.obi.v1
      FILLS_TOPIC: executions.fills.v1
      PORT: "8091"
      MIN_SAMPLES: "15"
      RETRAIN_INTERVAL: "30"
      # CORS: defaults to "*" (permissive). Lock to a single origin in prod.
      ACCESS_CONTROL_ALLOW_ORIGIN: ${ACCESS_CONTROL_ALLOW_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    restart: unless-stopped

  # ── Observability ─────────────────────────────────────────────────────

  # Distributed tracing collector. Huginn → Sleipnir spans propagate via W3C
  # TraceContext on Kafka headers and land here over OTLP/gRPC (port 4317).
  # Services only export when OTEL_EXPORTER_OTLP_ENDPOINT is set (see below);
  # with this collector present, the endpoint is wired by default.
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"  # Tempo HTTP / query API
      - "4317:4317"  # OTLP gRPC ingest
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo.yaml:ro
    mem_limit: 512m
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9091:9090"
    # remote-write-receiver lets Tempo's metrics_generator push service-graph /
    # span metrics here so Grafana's service-graph view has data. The default
    # config-file + scrape flags must be restated when overriding command.
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
    depends_on:
      huginn:
        condition: service_healthy
      alertmanager:
        condition: service_started
    mem_limit: 256m
    restart: unless-stopped

  # Routes Prometheus alerts. Minimal local-dev config with a null receiver
  # (see monitoring/alertmanager.yml); point a receiver at a real webhook to
  # actually deliver notifications.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    mem_limit: 128m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-norse}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    mem_limit: 256m
    restart: unless-stopped

  # ── Intelligence ─────────────────────────────────────────────────────

  news-sentinel:
    build:
      context: ./services/news-sentinel
      dockerfile: Dockerfile
    ports:
      - "8089:8089"
    environment:
      OLLAMA_HOST: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "qwen2.5:14b"
      POLL_INTERVAL: "300"
      PORT: "8089"
      # CORS: defaults to "*" (permissive). Lock to a single origin in prod.
      ACCESS_CONTROL_ALLOW_ORIGIN: ${ACCESS_CONTROL_ALLOW_ORIGIN:-*}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8089/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    restart: unless-stopped

volumes:
  sleipnir-data:
  pgdata-muninn:
  pgdata-huginn:
