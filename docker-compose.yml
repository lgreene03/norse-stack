# Norse Stack — all four services on a shared Redpanda broker.
#
# Usage:
#   docker compose up -d --build
#   ./scripts/smoke.sh
#   docker compose down -v
#
# Requires sibling checkouts: ../muninn, ../huginn, ../sleipnir
# Run ./scripts/clone-all.sh to set up all repos.
# Sleipnir runs in sim mode (no Binance credentials needed).
# Huginn runs with live_execution=true (publishes intents to Kafka).

services:

  # ── Shared infrastructure ─────────────────────────────────────────────

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.1.0
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092

  postgres-muninn:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: muninn
      POSTGRES_USER: muninn
      POSTGRES_PASSWORD: muninn
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muninn"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata-muninn:/var/lib/postgresql/data

  postgres-huginn:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: huginn
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata-huginn:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/muninn-raw;
      mc mb --ignore-existing local/muninn-warehouse;
      mc mb --ignore-existing local/muninn-checkpoints;
      "

  # ── Application services ──────────────────────────────────────────────

  muninn:
    build:
      context: ../muninn
      dockerfile: Dockerfile
    depends_on:
      postgres-muninn:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-muninn:5432/muninn
      SPRING_DATASOURCE_USERNAME: muninn
      SPRING_DATASOURCE_PASSWORD: muninn
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      MUNINN_STORAGE_S3_ENDPOINT: http://minio:9000
      MUNINN_STORAGE_S3_ACCESS_KEY: minioadmin
      MUNINN_STORAGE_S3_SECRET_KEY: minioadmin
      MUNINN_INGESTION_BINANCE_ENABLED: "false"
      MUNINN_INGESTION_COINBASE_ENABLED: "false"

  huginn:
    build:
      context: ../huginn
      dockerfile: Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      postgres-huginn:
        condition: service_healthy
    ports:
      - "8083:8081"
      - "8084:8084"
    environment:
      KAFKA_BROKERS: redpanda:29092
      KAFKA_TOPICS: features.obi.v1
      KAFKA_GROUP_ID: huginn-paper-trader
      STRATEGY_NAME: obi
      STRATEGY_THRESHOLD: "0.7"
      STRATEGY_ORDER_SIZE: "0.01"
      LIVE_EXECUTION: "true"
      KAFKA_INTENTS_TOPIC: executions.intents.v1
      KAFKA_FILLS_TOPIC: executions.fills.v1
      DATABASE_ENABLED: "true"
      DATABASE_URL: postgres://postgres:postgres@postgres-huginn:5432/huginn?sslmode=disable
      CAPITAL_INITIAL_CASH: "100000"
      SERVER_PORT: "8081"

  sleipnir:
    build:
      context: ../sleipnir
      dockerfile: Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
      KAFKA_INTENTS_TOPIC: executions.intents.v1
      KAFKA_FILLS_TOPIC: executions.fills.v1
      KAFKA_CONSUMER_GROUP: sleipnir-gateway
      EXCHANGE_BACKEND: sim
      RATE_LIMIT_RPS: "10.0"
      PORT: "8080"
      DB_PATH: /app/data/sleipnir.db
    volumes:
      - sleipnir-data:/app/data

volumes:
  sleipnir-data:
  pgdata-muninn:
  pgdata-huginn:
